parent: tpl-dev
packages:
  - java-26-openjdk-devel
  - autoconf
  - alsa-lib-devel
  - capstone-devel
  - cups-devel
  - fontconfig-devel
  - freetype-devel
  - libXtst-devel
  - libXt-devel
  - libXrender-devel
  - libXrandr-devel
  - libXi-devel
  - libjpeg-turbo-devel
  - libpng-devel
  - giflib-devel
