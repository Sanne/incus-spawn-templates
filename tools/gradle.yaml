name: gradle
description: Gradle build tool (latest release)

run:
  - |
    GRADLE_VERSION=$(curl -s https://services.gradle.org/versions/current | grep -oP '"version"\s*:\s*"\K[^"]+') &&
    echo "Downloading Gradle $GRADLE_VERSION..." &&
    curl -sL -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip &&
    unzip -q /tmp/gradle.zip -d /opt &&
    ln -sf /opt/gradle-${GRADLE_VERSION}/bin/gradle /usr/local/bin/gradle &&
    rm -f /tmp/gradle.zip

verify: gradle --version
