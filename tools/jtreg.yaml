name: jtreg
description: JTReg 8.2.1

downloads:
  - url: https://builds.shipilev.net/jtreg/jtreg-8.2.1%2B1.zip
    sha256: f4271a588c7f9ce6e303ece70231186deb2b29c0e350bb2ad5c69e40c95bb551
    extract: /opt
    links:
      /opt/jtreg/bin/jtreg: /usr/local/bin/jtreg

env:
  - export JTREG_HOME=/opt/jtreg
  - export JTREG_JAVA=/usr/lib/jvm/java-latest-openjdk

run:
  - chmod -R a+rX /opt/jtreg

verify: jtreg -version
